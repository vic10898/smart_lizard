                let reachForward = leg.isFront ? 45 : -5;
                let spreadOut = 65; 
                
                let idealX = p1.x + Math.cos(idealAngle) * spreadOut + Math.cos(bodyAngle) * reachForward;
                let idealY = p1.y + Math.sin(idealAngle) * spreadOut + Math.sin(bodyAngle) * reachForward;

                let d = Math.hypot(idealX - leg.x, idealY - leg.y);
                
                let dragX = leg.x - p1.x;
                let dragY = leg.y - p1.y;
                let forwardProjection = dragX * Math.cos(bodyAngle) + dragY * Math.sin(bodyAngle);
                let lateralProjection = dragX * Math.cos(bodyAngle + (Math.PI / 2) * leg.side) + dragY * Math.sin(bodyAngle + (Math.PI / 2) * leg.side);
                
                // ИСПРАВЛЕНИЕ: Проверяем, не наступил ли ящер сам себе на ногу (пузико задавило ступню)
                let bodyCrushed = lateralProjection < 28;

                // ИСПРАВЛЕНИЕ: Меньше топтания на месте
                if (leg.cooldownTimer > 0) leg.cooldownTimer--;

                // Экстренный шаг: если лапа критически отстала от плеча ИЛИ оказалась под телом
                let urgentStep = (leg.isFront && forwardProjection < 12) || (!leg.isFront && forwardProjection < -15) || bodyCrushed;
                
                // Динамический порог: если разворачиваемся на месте (currentSpeed < 1), 
                // разрешаем лапам растянуться сильнее (до 100px), чтобы не делать частые мелкие шажки
                let stepThreshold = 55; // Был 60, теперь лапы чуть ближе из-за короткого тела
                if (currentSpeed < 1.0) stepThreshold = 105; // Был 120

                let normalStep = (d > stepThreshold || urgentStep) && (targetSpeed > 0.05 || currentSpeed > 0.05) && !isEnjoying && !isLicking;
                // Форсированный шаг: если лапа критически далеко ИЛИ мы стоим, но лапу задавило
                let forcedStep = d > 150 || bodyCrushed; // был 120, стал 150 чтобы тянуло до последнего
                
                if (!leg.isStepping && (normalStep || forcedStep) && leg.cooldownTimer <= 0) {
                    let canStep = (leg.groupId === 0 && !isGroup1Stepping) || (leg.groupId === 1 && !isGroup0Stepping);
                    // Если тело заблокировано (bodyHalted) или ногу задавило, лапа шагает в приоритете
                    if (canStep || forcedStep || (urgentStep && bodyHalted)) {
                        leg.isStepping = true;
                        leg.startX = leg.x;
                        leg.startY = leg.y;
                        
                        let overshoot = 25 + Math.min(targetSpeed, 5) * 6;
                        let tx = idealX + Math.cos(bodyAngle) * overshoot; 
                        let ty = idealY + Math.sin(bodyAngle) * overshoot; 

                        // ИСПРАВЛЕНИЕ: Не наступаем на лицо
                        const headCenterX = points[0].x + Math.cos(currentHeadAngle) * 22;
                        const headCenterY = points[0].y + Math.sin(currentHeadAngle) * 22;
                        const distToHead = Math.hypot(tx - headCenterX, ty - headCenterY);
                        const minHeadDist = 85; // Увеличили с 58, чтобы лапы не лезли в глаза
                        if (distToHead < minHeadDist) {
                            const pushAngle = Math.atan2(ty - headCenterY, tx - headCenterX);
                            tx = headCenterX + Math.cos(pushAngle) * minHeadDist;
                            ty = headCenterY + Math.sin(pushAngle) * minHeadDist;
                        }

                        // ИСПРАВЛЕНИЕ: Не наступаем на пузико (для задних лап)
                        if (!leg.isFront) {
                            const bellyX = points[leg.seg].x;
                            const bellyY = points[leg.seg].y;
                            const distToBelly = Math.hypot(tx - bellyX, ty - bellyY);
                            const minBellyDist = 52; 

                            if (distToBelly < minBellyDist) {
                                const pushAngle = Math.atan2(ty - bellyY, tx - bellyX);
                                tx = bellyX + Math.cos(pushAngle) * minBellyDist;
                                ty = bellyY + Math.sin(pushAngle) * minBellyDist;
                            }
                        }

                        leg.targetX = tx;
                        leg.targetY = ty;
                        
                        leg.stepTime = 0; 
                        
                        // Рандомизируем углы пальцев для следующего приземления
                        for(let t=0; t<4; t++) {
                            // Очень легкое смещение от -0.075 до +0.075 радиан (было 0.2)
                            leg.toeOffsets[t] = (Math.random() - 0.5) * 0.15;
                        }
                    }
                }
                
                if (leg.isStepping) {
                    leg.stepTime += 0.06 + (targetSpeed * 0.015); // Был 0.15 + 0.02. Замедлили перенос лапы.
                    if (leg.stepTime >= 1) { 
                        leg.stepTime = 1; 
                        leg.isStepping = false; 
                        leg.cooldownTimer = 50; // Было 35. Даем лапе дольше постоять.
                    }
                    let t = leg.stepTime;
                    let ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                    leg.x = leg.startX + (leg.targetX - leg.startX) * ease;
                    leg.y = leg.startY + (leg.targetY - leg.startY) * ease;
                }
            });

            // --- РЕНДЕР ---
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            
            // Обновление еды и расчет слоев
            for (let i = foods.length - 1; i >= 0; i--) {
                let f = foods[i];
                
                // Авто-побег через 5 секунд
                if (!f.flying && (time - f.birth) > 5.0) {
                    f.flying = true;
                }

                if (f.flying) {
                    f.y -= 6; 
                    f.x += Math.sin(time * 15 + f.birth) * 4;
                    // Удаление улетевшей еды
                    if (f.y < -50) {
                        foods.splice(i, 1);
                        continue;
                    }
                }

                // Динамическое переключение слоев: "на передний план", если вылетел за пределы тела
                if (!f.isOver && f.flying) {
                    let isTouching = false;
                    for (let j = 0; j < numSegments; j++) {
                        let r = Math.max(baseRadius * (1 - Math.pow(j/numSegments, 1.4)), 2);
                        let bellyHump = Math.sin(Math.pow(j/(numSegments-1), 0.7) * Math.PI) * 22;
                        r += bellyHump;
                        if (j < 4) r *= (0.75 + (j/4)*0.25);
                        if (j > 5) r *= (1.0 - Math.min(1.0, (j-5)/3.0) * 0.5);

                        let dx = f.x - points[j].x;
                        let dy = f.y - points[j].y;
                        if (Math.hypot(dx, dy) < r + 15) { 
                            isTouching = true; break; 
                        }
                    }
                    if (!isTouching) f.isOver = true;
                }
            }

            function drawBug(f, i) {
                if (!isLicking || i !== lickedFoodIndex || lickTimer < 0.4 || f.flying) {
                    // Тело "мушки"
                    ctx.beginPath(); ctx.arc(f.x, f.y, 8, 0, Math.PI*2);
                    ctx.fillStyle = '#f59e0b'; ctx.shadowColor = '#fcd34d'; ctx.shadowBlur = 12; ctx.fill();
                    
                    // Крылышки
                    let flapSpeed = f.flying ? 35 : 12;
                    let flapAngle = Math.sin(time * flapSpeed + f.birth) * 0.6;
                    
                    ctx.beginPath();
                    ctx.ellipse(f.x - 8, f.y - 2, 8, 4, -Math.PI/6 + flapAngle, 0, Math.PI*2);
                    ctx.ellipse(f.x + 8, f.y - 2, 8, 4, Math.PI/6 - flapAngle, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                }
            }

            // Жуки теперь всегда рендерятся поверх всех слоев (на переднем стекле)

            ctx.save();
            ctx.translate(window.innerWidth/2, window.innerHeight/2); 
            ctx.scale(visualScale, visualScale); 
            ctx.translate(-window.innerWidth/2, -window.innerHeight/2);
            
            ctx.shadowColor = 'rgba(0, 0, 0, 0.12)'; 
            ctx.shadowBlur = 15; 
            ctx.shadowOffsetY = 8;

            drawGills();
            legs.forEach(leg => drawLimbBase(leg));
            
            // --- ПРЕДРАСЧЕТ РАДИУСОВ (АНАТОМИЯ) ---
            // Чтобы везде применять правильную форму тела
            segR = [];
            for (let i = 0; i < numSegments; i++) {
                let breath = Math.sin(time*1.5 + i*0.1) * 0.6;
                let r = Math.max(baseRadius * (1 - Math.pow(i/numSegments, 1.4)), 2);
                
                // ГОРБ ПУЗИКА: Смещен вперед (пик на i/numSegments ≈ 0.25)
                // Уменьшили ширину на 15% (было 26, стало 22)
                let bellyHump = Math.sin(Math.pow(i/(numSegments-1), 0.7) * Math.PI) * 22;
                r += bellyHump;
                
                // УТОНЧЕНИЕ ШЕИ
                if (i < 4) { r *= (0.75 + (i/4)*0.25); }
                
                // РАЗДЕЛЕНИЕ ТЕЛА И ХВОСТА: Резкое сужение СРАЗУ (теперь сегмент 5)
                if (i > 5) { 
                    // Хвост быстро становится тоньше, начиная с 5 сегмента
                    let tailPinch = 1.0 - Math.min(1.0, (i - 5) / 3.0) * 0.5; 
                    r *= tailPinch;
                }
                
                segR.push(r + breath);
            }

            // ПРОХОД 0.5: Крокодильи засечки (Шипы по бокам) - ТЕПЕРЬ ПОД ТЕЛОМ
            for (let i = 1; i < numSegments - 3; i++) {
                let r = segR[i];
                let nx = Math.cos(angles[i]+Math.PI/2);
                let ny = Math.sin(angles[i]+Math.PI/2);
                
                let spikeH = 4 + Math.sin((i/(numSegments-1))*Math.PI)*7; 
                let spikeW = 5 + Math.sin((i/(numSegments-1))*Math.PI)*5;

                for(let side of [-1, 1]) {
                    ctx.beginPath();
                    // Вдавливаем основание МАКСИМАЛЬНО ГЛУБОКО (r - 6), чтобы не было щелей при изгибе
                    // Так как они теперь ПОД телом, их изнанка будет скрыта кожей.
                    let bx = points[i].x + nx * (r - 6) * side;
                    let by = points[i].y + ny * (r - 6) * side;
                    
                    ctx.moveTo(bx - Math.cos(angles[i]) * spikeW, by - Math.sin(angles[i]) * spikeW);
                    let tipX = bx + nx * spikeH * side;
                    let tipY = by + ny * spikeH * side;
                    ctx.lineTo(tipX, tipY);
                    ctx.lineTo(bx + Math.cos(angles[i]) * spikeW, by + Math.sin(angles[i]) * spikeW);
                    
                    let grd = ctx.createLinearGradient(bx, by, tipX, tipY);
                    grd.addColorStop(0, colorBody); 
                    grd.addColorStop(1, colorSpikes); 
                    ctx.fillStyle = grd; 
                    ctx.fill();
                }
            }


            // ПРОХОД 0.75: Цельный гладкий хвост (без кругов-сегментов) - Начинается от задних лап (сегмент 6)
            ctx.beginPath();
            let tailStartIdx = 6; 
            
            // Правая сторона хвоста
            for (let i = tailStartIdx; i < numSegments; i++) {
                let nx = Math.cos(angles[i]+Math.PI/2);
                let ny = Math.sin(angles[i]+Math.PI/2);
                let r = segR[i];
                
                if (i === numSegments - 1) {
                    let tailAngle = angles[i] + Math.PI;
                    let w = (r + 1.5) * 0.55; 
                    ctx.lineTo(points[i].x + nx * w, points[i].y + ny * w);
                    let tipX = points[i].x + Math.cos(tailAngle)*7;
                    let tipY = points[i].y + Math.sin(tailAngle)*7;
                    ctx.quadraticCurveTo(tipX, tipY, points[i].x - nx * w, points[i].y - ny * w);
                } else {
                    // Плавно ведем линию по боку хвоста
                    ctx.lineTo(points[i].x + nx * r, points[i].y + ny * r);
                }
            }
            // Левая сторона хвоста
            for (let i = numSegments - 2; i >= tailStartIdx; i--) {
                let nx = Math.cos(angles[i]+Math.PI/2);
                let ny = Math.sin(angles[i]+Math.PI/2);
                let r = segR[i];
                ctx.lineTo(points[i].x - nx * r, points[i].y - ny * r);
            }
            // Линейный градиент для всего хвоста целиком
            let tailBase = points[tailStartIdx];
            let tailTip = points[numSegments - 1];
            let tipGrd = ctx.createLinearGradient(tailBase.x, tailBase.y, tailTip.x, tailTip.y);
            tipGrd.addColorStop(0, colorBody);
            tipGrd.addColorStop(1, `hsl(${h}, ${s}%, ${l * 0.6}%)`); 
            ctx.fillStyle = tipGrd; 
            ctx.fill();


            // ПРОХОД 1: Темное тело
            for (let i = numSegments - 1; i >= 0; i--) {
                ctx.beginPath(); ctx.arc(points[i].x, points[i].y, segR[i], 0, Math.PI * 2); 
                
                let t = Math.max(0, Math.min(1, i / (numSegments - 1))); 
                let lCenterAdj = l + 5 - (15 * t); 
                let lEdgeAdj = l - 5 - (15 * t);   
                
                let grd = ctx.createRadialGradient(
                    points[i].x - segR[i]*0.3, points[i].y - segR[i]*0.3, segR[i]*0.1, 
                    points[i].x, points[i].y, segR[i]
                );
                grd.addColorStop(0, `hsl(${h}, ${s}%, ${lCenterAdj}%)`);
                grd.addColorStop(1, `hsl(${h}, ${s}%, ${lEdgeAdj}%)`);

                if (i <= 6) { ctx.fillStyle = grd; ctx.fill(); }
            }
            
            ctx.shadowColor = 'transparent';

            // ПРОХОД 2: Цветное пузико
            for (let i = numSegments - 13; i >= 0; i--) {
                ctx.beginPath(); ctx.arc(points[i].x, points[i].y, segR[i] * 0.7, 0, Math.PI * 2); 
                
                let t = Math.max(0, Math.min(1, i / (numSegments - 1))); 
                let lCenterAdj = (l + 25) + 10 - (20 * t); 
                let lEdgeAdj = (l + 25) - 10 - (20 * t); 
                
                let grd = ctx.createRadialGradient(
                    points[i].x, points[i].y, 0, 
                    points[i].x, points[i].y, segR[i] * 0.7
                );
                grd.addColorStop(0, `hsl(${h}, ${s}%, ${lCenterAdj}%)`);
                grd.addColorStop(1, `hsl(${h}, ${s}%, ${lEdgeAdj}%)`);

                ctx.fillStyle = grd;
                ctx.fill();
            }

            // ПРОХОД 4: Размытое свечение
            ctx.beginPath();
            for (let i = numSegments - 13; i > 1; i--) {
                if (i === numSegments - 13) ctx.moveTo(points[i].x, points[i].y);
                else ctx.lineTo(points[i].x, points[i].y);
            }
            let breathPulse = 0.18 + Math.sin(time * 1.5) * 0.05;
            let glowWidth = isEnjoying ? 26 : (18 + currentSpeed * 1.5);
            ctx.strokeStyle = colorBelly.replace(')', `, ${breathPulse})`).replace('hsl', 'hsla');
            ctx.lineWidth = glowWidth;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowColor = colorBelly.replace(')', ', 0.4)').replace('hsl', 'hsla');
            ctx.shadowBlur = isEnjoying ? 28 : 18;
            ctx.stroke();
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            
            drawThoughtBubbleConnectors();
            
            // ПРОХОД 5: Лапки со сплющивающимися подушечками (ТЕПЕРЬ ПОД ГОЛОВОЙ)
            legs.forEach(leg => drawFootPads(leg));

            drawHeadAndEyes();
            
            // ПРОХОД 6: Запотевшее стекло от дыхания (самый верхний слой)
            breaths.forEach((b, i) => {
                b.life -= 0.015;
                if (b.life <= 0) {
                    breaths.splice(i, 1);
                } else {
                    let r = 10 + (1 - b.life) * 35; // Расширяется
                    let opacity = b.life * 0.15; // Очень легкий туман
                    let grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, r);
                    grd.addColorStop(0, `rgba(255, 255, 255, ${opacity})`);
                    grd.addColorStop(1, `rgba(255, 255, 255, 0)`);
                    
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, r, 0, Math.PI*2);
                    ctx.fillStyle = grd;
                    ctx.fill();
                }
            });

            drawThoughtBubbleMain();

            ctx.restore();

            // РЕНДЕР ПАСС 2: Все жуки рисуются поверх ящерицы
            foods.forEach((f, idx) => drawBug(f, idx));

            requestAnimationFrame(update);
        }

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Error', err));
            });
        }

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            // Устанавливаем физический размер канваса (количество пикселей)
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            
            // Устанавливаем логический размер канваса (размер на странице)
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            
            // Масштабируем контекст, чтобы логические координаты (x, y) работали как раньше
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0); 
            
            visualScale = 1; 
            if (lizardEngineStarted) updateLizardDimensions();
        }

        window.addEventListener('resize', resize);
        resize();
        
        update(); 

        } // Конец initLizardEngine

        bootGame();
    </script>
</body>
</html>
